version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: energy_regimes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/energy_regimes
      - MODEL_SAVE_DIR=/backend/saved_models
    depends_on:
      - db
    volumes:
      - ./backend/app:/backend/app
      - model_data:/backend/saved_models
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Provide the backend API URL. In production/EC2, this should ideally be the public IP or domain.
        # For local Docker setup, you might need to adjust this depending on how you access the frontend.
        - VITE_API_URL=http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  model_data:
