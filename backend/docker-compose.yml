version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: energy_regimes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/energy_regimes
      - MODEL_SAVE_DIR=/backend/saved_models
    depends_on:
      - db
    volumes:
      - ./app:/backend/app
      - model_data:/backend/saved_models

volumes:
  postgres_data:
  model_data:
